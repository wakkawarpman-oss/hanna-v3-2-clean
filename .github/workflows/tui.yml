name: TUI Health

on:
  pull_request:
    paths:
      - "hanna-tui.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/tui.yml"
  push:
    branches:
      - master

jobs:
  tui-health:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run contract tests
        run: npm test

      - name: Validate TUI syntax
        run: npm run tui:check
