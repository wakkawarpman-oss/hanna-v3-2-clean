name: Parser Tests

on:
  push:
  pull_request:

jobs:
  parser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test:parser-files
      - run: npm run generate:parser-report
      - uses: actions/upload-artifact@v4
        with:
          name: parser-report
          path: test/parser-report.json
