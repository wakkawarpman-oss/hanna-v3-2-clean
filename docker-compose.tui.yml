version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.tui
    command: sh -c "JWT_SECRET=local-stage2-secret npm run start"
    ports:
      - "3000:3000"
    environment:
      - JWT_SECRET=local-stage2-secret

  tui:
    image: node:20-alpine
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "npm install && npm run tui"
    depends_on:
      - api
