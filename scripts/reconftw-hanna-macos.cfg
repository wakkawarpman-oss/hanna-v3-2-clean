# HANNA reconFTW profile for macOS.
# This file is sourced after the upstream reconftw.cfg via -f.

install_golang=false
upgrade_tools=false
upgrade_before_running=false
update_resolvers=false
generate_resolvers=false
STRUCTURED_LOGGING=false

# Keep OSINT useful but avoid the heaviest or most failure-prone modules.
OSINT=true
GOOGLE_DORKS=true
GITHUB_DORKS=false
GITHUB_REPOS=false
METADATA=false
EMAILS=true
DOMAIN_INFO=true
IP_INFO=true
API_LEAKS=false
THIRD_PARTIES=true
SPOOF=false
MAIL_HYGIENE=true
CLOUD_ENUM=false
GITHUB_LEAKS=false
GITHUB_ACTIONS_AUDIT=false

# Prefer passive and low-friction subdomain discovery on macOS.
SUBDOMAINS_GENERAL=true
SUBPASSIVE=true
SUBCRT=true
ASN_ENUM=true
SUBNOERROR=false
SUBANALYTICS=false
SUBBRUTE=false
SUBSCRAPING=false
SUBPERMUTE=false
SUBIAPERMUTE=false
SUBREGEXPERMUTE=false
SUBTAKEOVER=false
SUB_RECURSIVE_PASSIVE=false
SUB_RECURSIVE_BRUTE=false
ZONETRANSFER=false
S3BUCKETS=false
REVERSE_IP=false
PTR_SWEEP=false
SRV_ENUM=false
NS_DELEGATION=false

# Keep web probing and nuclei; leave screenshots to EyeWitness wrapper.
WEBPROBEFULL=true
WEBSCREENSHOT=false
VIRTUALHOSTS=false
TLS_IP_PIVOTS=false

# Avoid active nmap-heavy steps in the reconFTW bundle; nuclei still runs.
PORTSCANNER=true
GEO_INFO=true
PORTSCAN_PASSIVE=true
PORTSCAN_ACTIVE=false
SERVICE_FINGERPRINT=false
PORTSCAN_UDP=false
CDN_IP=true
CDN_BYPASS=false

WAF_DETECTION=true
NUCLEICHECK=true
NUCLEI_SEVERITY="medium,high,critical"
URL_CHECK=true
URL_CHECK_PASSIVE=true
URL_CHECK_ACTIVE=false
URL_GF=true
URL_EXT=true
JSCHECKS=false
JS_SUB_EXTRACT=false
WELLKNOWN_PIVOTS=false
FUZZ=false
FUZZPARAMS=false
IIS_SHORTNAME=false
CMS_SCANNER=false
WORDLIST=false
ROBOTSWORDLIST=false
PASSWORD_DICT=false

PARALLEL_MODE=false
OUTPUT_VERBOSITY=1
SHOW_COMMANDS=false